<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario QR – Sato Group</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #21253a;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: #2e3348;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--muted);
  }

  .stats-bar span strong {
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Scanner section */
  .scanner-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .scanner-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .scanner-title {
    font-weight: 600;
    font-size: 15px;
    display: flex; align-items: center; gap: 8px;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .scanner-body {
    padding: 20px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  #qr-reader {
    width: 260px;
    min-height: 220px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    flex-shrink: 0;
    position: relative;
  }

  #qr-reader video { border-radius: 12px; }

  /* override html5-qrcode styles */
  #qr-reader img { display: none !important; }
  #qr-reader__status_span { display: none !important; }
  #qr-reader__dashboard_section_csr span { font-family: 'Space Grotesk', sans-serif !important; font-size: 12px !important; color: var(--muted) !important; }
  #qr-reader__dashboard_section_csr button {
    background: var(--accent) !important;
    border: none !important;
    color: #fff !important;
    padding: 8px 16px !important;
    border-radius: 8px !important;
    font-family: 'Space Grotesk', sans-serif !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    margin-top: 8px !important;
  }
  #qr-reader__camera_selection {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 6px !important;
    padding: 4px 8px !important;
    font-family: 'Space Grotesk', sans-serif !important;
    font-size: 12px !important;
    margin-bottom: 6px !important;
  }

  .scanner-controls {
    flex: 1;
    min-width: 220px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .result-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }

  .result-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .result-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    min-height: 28px;
  }

  .result-raw {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .manual-row {
    display: flex;
    gap: 8px;
  }

  .manual-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .manual-input:focus { border-color: var(--accent); }
  .manual-input::placeholder { color: var(--muted); }

  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { opacity: 0.85; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-ghost { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }

  .flash {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    display: none;
  }

  .flash.ok { display: block; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
  .flash.err { display: block; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
  .flash.warn { display: block; background: rgba(234,179,8,0.15); border: 1px solid rgba(234,179,8,0.3); color: #eab308; }

  /* Table section */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .table-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .table-title {
    font-weight: 600;
    font-size: 15px;
  }

  .table-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .search-input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    border-radius: 8px;
    outline: none;
    width: 180px;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead th {
    padding: 10px 20px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    font-weight: 600;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(79,142,247,0.05); }

  tbody td {
    padding: 12px 20px;
    vertical-align: middle;
  }

  .num-caja {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
  }

  .badge-count {
    background: var(--accent);
    color: #fff;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .badge-dup {
    background: #eab308;
    color: #000;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 6px;
  }

  .ts {
    color: var(--muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .raw-code {
    color: var(--muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }

  .btn-del:hover { color: var(--red); background: rgba(239,68,68,0.1); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Summary chips */
  .summary-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .chip strong { font-variant-numeric: tabular-nums; color: var(--text); }
  .chip span { color: var(--muted); }

  @media (max-width: 600px) {
    .scanner-body { flex-direction: column; }
    #qr-reader { width: 100%; }
    .stats-bar { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📦</div>
    Inventario QR
  </div>
  <div class="stats-bar">
    <span>Cajas únicas: <strong id="h-unique">0</strong></span>
    <span>Escaneos: <strong id="h-total">0</strong></span>
  </div>
</header>

<main>

  <!-- SCANNER -->
  <div class="scanner-card">
    <div class="scanner-header">
      <div class="scanner-title">
        <div class="dot" id="scanner-dot"></div>
        Escáner de cámara
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" id="btn-start" onclick="startScanner()">▶ Iniciar</button>
        <button class="btn btn-ghost" id="btn-stop" onclick="stopScanner()" style="display:none">⏹ Detener</button>
      </div>
    </div>

    <div class="scanner-body">
      <div id="qr-reader"></div>

      <div class="scanner-controls">
        <div class="result-box">
          <div class="result-label">Número de caja detectado</div>
          <div class="result-value" id="num-display">—</div>
          <div class="result-raw" id="raw-display">Esperando escaneo...</div>
        </div>

        <div id="flash-msg" class="flash"></div>

        <button class="btn btn-success" id="btn-add" onclick="addCurrent()" style="display:none">
          ✓ Registrar caja
        </button>

        <div style="border-top: 1px solid var(--border); padding-top: 12px;">
          <div class="result-label" style="margin-bottom:8px">Entrada manual</div>
          <div class="manual-row">
            <input class="manual-input" id="manual-input" placeholder="A032/25-26-291 o solo 291" />
            <button class="btn btn-primary" onclick="addManual()">+ Agregar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">Registro de inventario</div>
      <div class="table-actions">
        <input class="search-input" id="search-input" placeholder="🔍 Buscar..." oninput="renderTable()">
        <button class="btn btn-ghost" onclick="exportCSV()">↓ CSV</button>
        <button class="btn btn-danger" onclick="clearAll()">🗑 Limpiar</button>
      </div>
    </div>

    <div id="table-container">
      <div class="empty-state">
        <div class="icon">📷</div>
        <p>Inicia el escáner o agrega una caja manualmente</p>
      </div>
    </div>

    <div class="summary-row" id="summary-row" style="display:none">
      <div class="chip"><span>Total escaneos</span><strong id="s-total">0</strong></div>
      <div class="chip"><span>Cajas únicas</span><strong id="s-unique">0</strong></div>
      <div class="chip"><span>Duplicados</span><strong id="s-dups">0</strong></div>
      <div class="chip"><span>Última:</span><strong id="s-last">—</strong></div>
    </div>
  </div>

</main>

<script>
let html5QrCode = null;
let inventory = JSON.parse(localStorage.getItem('inventario-qr') || '[]');
let lastDetected = null;
let scanCooldown = false;

function save() {
  localStorage.setItem('inventario-qr', JSON.stringify(inventory));
}

function extractBoxNumber(raw) {
  raw = raw.trim();
  // Pattern: anything-NUMBER  →  extract NUMBER (last segment after last dash)
  const m = raw.match(/-\s*(\d+)\s*$/);
  if (m) return m[1];
  // If it's just a number
  if (/^\d+$/.test(raw)) return raw;
  // Fallback: return raw
  return raw;
}

function showFlash(type, msg) {
  const el = document.getElementById('flash-msg');
  el.className = 'flash ' + type;
  el.textContent = msg;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'flash'; }, 3000);
}

async function startScanner() {
  if (html5QrCode) return;
  try {
    html5QrCode = new Html5Qrcode("qr-reader");
    const devices = await Html5Qrcode.getCameras();
    if (!devices || !devices.length) { showFlash('err', 'No se encontró cámara'); return; }
    // prefer back camera
    const cam = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];

    await html5QrCode.start(
      cam.id,
      { fps: 10, qrbox: { width: 220, height: 180 }, aspectRatio: 1.2 },
      onScanSuccess,
      () => {}
    );

    document.getElementById('scanner-dot').classList.add('active');
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = '';
  } catch(e) {
    showFlash('err', 'Error cámara: ' + e);
    html5QrCode = null;
  }
}

async function stopScanner() {
  if (!html5QrCode) return;
  try { await html5QrCode.stop(); } catch(e) {}
  html5QrCode = null;
  document.getElementById('scanner-dot').classList.remove('active');
  document.getElementById('btn-start').style.display = '';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('btn-add').style.display = 'none';
}

function onScanSuccess(decodedText) {
  if (scanCooldown) return;
  scanCooldown = true;
  setTimeout(() => scanCooldown = false, 1500);

  const num = extractBoxNumber(decodedText);
  lastDetected = { raw: decodedText, num };

  document.getElementById('num-display').textContent = num;
  document.getElementById('raw-display').textContent = decodedText;

  // Check duplicate
  const isDup = inventory.some(r => r.num === num);
  if (isDup) {
    showFlash('warn', `Caja ${num} ya está registrada`);
  }

  document.getElementById('btn-add').style.display = '';

  // Auto-add
  autoAdd(lastDetected);
}

function autoAdd(entry) {
  const now = new Date();
  inventory.unshift({
    num: entry.num,
    raw: entry.raw,
    ts: now.toISOString(),
    tsDisplay: now.toLocaleString('es-CO', { hour12: false })
  });
  save();
  renderTable();
  updateHeader();

  const isDup = inventory.filter(r => r.num === entry.num).length > 1;
  if (isDup) {
    showFlash('warn', `⚠ Caja ${entry.num} duplicada (${inventory.filter(r=>r.num===entry.num).length}x)`);
  } else {
    showFlash('ok', `✓ Caja ${entry.num} registrada`);
  }
}

function addCurrent() {
  if (!lastDetected) return;
  autoAdd(lastDetected);
  document.getElementById('btn-add').style.display = 'none';
  lastDetected = null;
}

function addManual() {
  const val = document.getElementById('manual-input').value.trim();
  if (!val) return;
  const num = extractBoxNumber(val);
  autoAdd({ raw: val, num });
  document.getElementById('manual-input').value = '';
}

function deleteEntry(idx) {
  inventory.splice(idx, 1);
  save();
  renderTable();
  updateHeader();
}

function clearAll() {
  if (!confirm('¿Limpiar todo el inventario?')) return;
  inventory = [];
  save();
  renderTable();
  updateHeader();
}

function updateHeader() {
  const unique = new Set(inventory.map(r => r.num)).size;
  document.getElementById('h-unique').textContent = unique;
  document.getElementById('h-total').textContent = inventory.length;
}

function renderTable() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const filtered = q ? inventory.filter((r, i) => r.num.toLowerCase().includes(q) || r.raw.toLowerCase().includes(q)) : inventory;

  const container = document.getElementById('table-container');

  if (!inventory.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📷</div><p>Inicia el escáner o agrega una caja manualmente</p></div>`;
    document.getElementById('summary-row').style.display = 'none';
    return;
  }

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>Sin resultados para "${q}"</p></div>`;
    document.getElementById('summary-row').style.display = 'none';
    return;
  }

  // Count per num
  const counts = {};
  inventory.forEach(r => counts[r.num] = (counts[r.num] || 0) + 1);

  let rows = '';
  filtered.forEach((r, i) => {
    const realIdx = inventory.indexOf(r);
    const isDup = counts[r.num] > 1;
    rows += `
      <tr>
        <td><span class="num-caja">${r.num}</span>${isDup ? `<span class="badge-dup">${counts[r.num]}×</span>` : ''}</td>
        <td><span class="raw-code" title="${r.raw}">${r.raw}</span></td>
        <td><span class="ts">${r.tsDisplay}</span></td>
        <td><button class="btn-del" onclick="deleteEntry(${realIdx})" title="Eliminar">✕</button></td>
      </tr>`;
  });

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Nº Caja</th>
          <th>Código QR raw</th>
          <th>Fecha / Hora</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;

  // Summary
  const dups = inventory.filter(r => counts[r.num] > 1).length;
  const unique = Object.keys(counts).length;
  document.getElementById('s-total').textContent = inventory.length;
  document.getElementById('s-unique').textContent = unique;
  document.getElementById('s-dups').textContent = dups;
  document.getElementById('s-last').textContent = inventory[0]?.num || '—';
  document.getElementById('summary-row').style.display = 'flex';
}

function exportCSV() {
  if (!inventory.length) return;
  let csv = 'Num_Caja,Codigo_QR,Fecha_Hora\n';
  inventory.forEach(r => {
    csv += `"${r.num}","${r.raw}","${r.tsDisplay}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `inventario_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Enter key on manual input
document.getElementById('manual-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addManual();
});

// Init
renderTable();
updateHeader();
</script>
</body>
</html>
